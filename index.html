<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BackseBacho</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e5e7eb;
}
header {
  background: linear-gradient(to right, #2563eb, #f97316);
  text-align: center;
  padding: 25px 20px;
}
.section {
  padding: 30px 20px;
  max-width: 1200px;
  margin: auto;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
}
button {
  background: #22c55e;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  color: white;
}
.backBtn {
  background: red;
}
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>BackseBacho</h1>
</header>

<div id="home">
  <div class="section">
    <h2>UG Courses</h2>
    <div class="grid">
      <div class="card"><button onclick="goDepartments()">Engineering</button></div>
      <div class="card"><button onclick="goSemester('BBA')">BBA</button></div>
    </div>
  </div>

  <div class="section">
    <h2>PG Courses</h2>
    <div class="grid">
      <div class="card"><button onclick="goSemester('MTech')">MTech</button></div>
    </div>
  </div>
</div>

<div id="departments" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2>Departments</h2>
  <div class="grid">
    <div class="card" onclick="goSemester('CS')">CS</div>
  </div>
</div>

<div id="semester" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2 id="title"></h2>
  <div class="grid" id="semGrid"></div>
</div>

<div id="content" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2 id="contentTitle"></h2>
</div>

<footer>© BackseBacho</footer>

<script>

function hideAll() {
  document.getElementById("home").style.display = "none";
  document.getElementById("departments").style.display = "none";
  document.getElementById("semester").style.display = "none";
  document.getElementById("content").style.display = "none";
}

function goHome() {
  hideAll();
  document.getElementById("home").style.display = "block";
}

function goDepartments() {
  hideAll();
  document.getElementById("departments").style.display = "block";
}

function goSemester(dept) {
  hideAll();
  document.getElementById("semester").style.display = "block";
  document.getElementById("title").innerText = dept;

  let html = "";
  for (let i=1;i<=8;i++) {
    html += `<div class="card" onclick="goContent('${dept} Sem ${i}')">Sem ${i}</div>`;
  }
  document.getElementById("semGrid").innerHTML = html;
}

function goContent(title) {
  hideAll();
  document.getElementById("content").style.display = "block";
  document.getElementById("contentTitle").innerText = title;
}

</script>

</body>
</html>
