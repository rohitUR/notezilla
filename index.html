<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BackseBacho</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e5e7eb;
}

header {
  background: linear-gradient(to right, #2563eb, #f97316);
  text-align: center;
  padding: 25px;
}

.section {
  padding: 30px 20px;
  max-width: 1200px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}

button {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

.backBtn {
  background: red;
}

footer {
  text-align: center;
  padding: 20px;
  color: #9ca3af;
}
</style>
</head>

<body>

<header>
  <h1>BackseBacho 🚀</h1>
  <p>Back Matt Lagwana</p>
</header>

<!-- HOME -->
<div id="home">

<div class="section">
  <h2>UG Courses</h2>
  <div class="grid">
    <div class="card"><button onclick="showDepartments()">Engineering</button></div>
    <div class="card"><button onclick="openSemester('BBA')">BBA</button></div>
    <div class="card"><button onclick="openSemester('BSC')">BSC</button></div>
    <div class="card"><button onclick="openSemester('BA')">BA</button></div>
  </div>
</div>

<div class="section">
  <h2>PG Courses</h2>
  <div class="grid">
    <div class="card"><button onclick="openSemester('MTech')">MTech</button></div>
    <div class="card"><button onclick="openSemester('MCA')">MCA</button></div>
  </div>
</div>

<div class="section">
  <h2>Diploma</h2>
  <div class="grid">
    <div class="card"><button onclick="openSemester('Diploma')">Diploma</button></div>
  </div>
</div>

<!-- TRUST -->
<div class="section">
  <h2>Why Trust Us?</h2>
  <div class="grid">
    <div class="card">📚 Verified Notes</div>
    <div class="card">⚡ Instant Download</div>
    <div class="card">👨‍🎓 Student Made</div>
  </div>
</div>

</div>

<!-- DEPARTMENTS -->
<div class="section" id="departments" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2>Select Department</h2>
  <div class="grid">
    <div class="card" onclick="openSemester('CSIT')">CSIT</div>
    <div class="card" onclick="openSemester('CH')">CH</div>
    <div class="card" onclick="openSemester('ME')">ME</div>
  </div>
</div>

<!-- SEMESTER -->
<div class="section" id="semester" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2 id="title"></h2>
  <div class="grid" id="semGrid"></div>
</div>

<!-- CONTENT -->
<div class="section" id="content" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2 id="contentTitle"></h2>

  <div class="grid">

    <div class="card">
      <h3>Notes</h3>

      <a href="sample.pdf" target="_blank">
        <button>Sample</button>
      </a>

      <button onclick="pay()">Buy ₹19</button>
    </div>

    <div class="card">
      <h3>Full Bundle 🔥</h3>

      <a href="sample.pdf" target="_blank">
        <button>Sample</button>
      </a>

      <button onclick="pay()">Buy ₹29</button>
    </div>

  </div>
</div>

<footer>© 2026 BackseBacho</footer>

<script>

function hideAll(){
  document.getElementById("home").style.display="none";
  document.getElementById("departments").style.display="none";
  document.getElementById("semester").style.display="none";
  document.getElementById("content").style.display="none";
}

function goHome(){
  hideAll();
  document.getElementById("home").style.display="block";
}

function showDepartments(){
  hideAll();
  document.getElementById("departments").style.display="block";
}

function openSemester(dept){
  hideAll();
  document.getElementById("semester").style.display="block";
  document.getElementById("title").innerText = dept;

  let html="";
  for(let i=1;i<=8;i++){
    html += `<div class="card" onclick="openContent('${dept} Sem ${i}')">Semester ${i}</div>`;
  }
  document.getElementById("semGrid").innerHTML = html;
}

function openContent(title){
  hideAll();
  document.getElementById("content").style.display="block";
  document.getElementById("contentTitle").innerText = title;
}

// 🔐 payment lock
function pay(){
  localStorage.setItem("paid","yes");

  window.open("https://razorpay.me/@rohit285","_blank");

  setTimeout(()=>{
    window.location.href="thankyou.html";
  },8000);
}

</script>

</body>
</html>
