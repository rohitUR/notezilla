<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BackseBacho</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: #e5e7eb;
}

header {
  background: linear-gradient(135deg, #2563eb, #f97316);
  text-align: center;
  padding: 30px 20px;
}

header img {
  border-radius: 16px;
}

.section {
  padding: 30px 20px;
  max-width: 1200px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
}

button {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  color: white;
  margin-top: 10px;
}

.backBtn {
  background: red;
}

.price {
  color: #60a5fa;
}

footer {
  text-align: center;
  padding: 20px;
}

</style>
</head>

<body>

<header>
  <img src="https://raw.githubusercontent.com/rohitUR/notezilla/main/logo.jpg" height="90">
  <h1>BackseBacho 🚀</h1>
</header>

<!-- HOME -->
<div id="home">

<div class="section">
  <h2>Engineering</h2>
  <div class="grid">
    <div class="card" onclick="openSemester('CSIT')">CSIT</div>
    <div class="card" onclick="openSemester('CH')">CH</div>
    <div class="card" onclick="openSemester('EE')">EE</div>
    <div class="card" onclick="openSemester('ECE')">ECE</div>
    <div class="card" onclick="openSemester('EI')">EI</div>
  </div>
</div>

</div>

<!-- SEMESTER -->
<div class="section" id="semester" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2 id="title"></h2>
  <div class="grid" id="semGrid"></div>
</div>

<!-- CONTENT -->
<div class="section" id="content" style="display:none;">
  <button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2 id="contentTitle"></h2>

  <div class="grid">

    <div class="card">
      <h3>Notes</h3>
      <div class="price">₹19</div>
      <button onclick="pay()">Buy</button>
    </div>

    <div class="card">
      <h3>PYQs</h3>
      <div class="price">₹15</div>
      <button onclick="pay()">Buy</button>
    </div>

    <div class="card">
      <h3>Mid Exams</h3>
      <div class="price">₹12</div>
      <button onclick="pay()">Buy</button>
    </div>

    <div class="card">
      <h3>Full Bundle 🔥</h3>
      <div class="price">₹29</div>
      <button onclick="pay()">Buy</button>
    </div>

  </div>

  <h3 id="status"></h3>

  <button id="downloadBtn" style="display:none;" onclick="download()">
    Download Notes
  </button>

</div>

<footer>© 2026 BackseBacho</footer>

<script>

// navigation
function goHome(){
  semester.style.display="none";
  content.style.display="none";
}

function openSemester(dept){
  home.style.display="none";
  semester.style.display="block";
  title.innerText=dept;

  let html="";
  for(let i=1;i<=8;i++){
    html+=`<div class="card" onclick="openContent('${dept} Sem ${i}')">Semester ${i}</div>`;
  }
  semGrid.innerHTML=html;
}

function openContent(titleText){
  semester.style.display="none";
  content.style.display="block";
  contentTitle.innerText=titleText;
  checkAccess();
}

// payment
function pay(){
  localStorage.setItem("paid","yes");
  window.open("https://razorpay.me/@rohit285","_blank");
  alert("Payment complete hone ke baad wapas aakar refresh kare");
}

// access check
function checkAccess(){
  if(localStorage.getItem("paid")==="yes"){
    status.innerText="✅ Access Unlocked";
    downloadBtn.style.display="block";
  } else {
    status.innerText="❌ Please complete payment";
    downloadBtn.style.display="none";
  }
}

// download
function download(){
  window.location.href="notes.pdf";
}

</script>

</body>
</html>
