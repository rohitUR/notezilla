<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BackseBacho</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('bg.jpg');
  background-size: cover;
}

header {
  background: linear-gradient(to right, #2563eb, #f97316);
  color: white;
  text-align: center;
  padding: 20px;
}

.section {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.8);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.price {
  font-weight: bold;
  color: #2563eb;
}

button {
  background: #22c55e;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<header>
  <h1>BackseBacho 🚀</h1>
</header>

<!-- MAIN COURSES -->
<div class="section" id="courses">
  <h2>UG Courses</h2>
  <div class="grid">

    <div class="card">
      <h3>Engineering</h3>
      <button onclick="showDepartments()">Explore</button>
    </div>

    <div class="card">
      <h3>BBA</h3>
      <button onclick="openSemester('BBA')">Explore</button>
    </div>

    <div class="card">
      <h3>B.SC</h3>
      <button onclick="openSemester('BSC')">Explore</button>
    </div>

    <div class="card">
      <h3>BA</h3>
      <button onclick="openSemester('BA')">Explore</button>
    </div>

  </div>
</div>

<!-- DEPARTMENTS -->
<div class="section" id="departments" style="display:none;">
  <h2>Select Department</h2>
  <div class="grid">

    <div class="card" onclick="openSemester('CSIT')">CSIT</div>
    <div class="card" onclick="openSemester('CH')">CH</div>
    <div class="card" onclick="openSemester('ME')">ME</div>
    <div class="card" onclick="openSemester('ECE')">ECE</div>
    <div class="card" onclick="openSemester('EI')">EI</div>
    <div class="card" onclick="openSemester('EE')">EE</div>

  </div>
</div>

<!-- SEMESTERS -->
<div class="section" id="semesters" style="display:none;">
  <h2 id="deptTitle"></h2>
  <div class="grid" id="semesterGrid"></div>
</div>

<!-- CONTENT -->
<div class="section" id="content" style="display:none;">
  <h2 id="contentTitle"></h2>
  <div class="grid">

    <div class="card">
      <h3>Notes</h3>
      <div class="price">₹19</div>
      <button onclick="pay('Notes',19)">Buy</button>
    </div>

    <div class="card">
      <h3>PYQs</h3>
      <div class="price">₹15</div>
      <button onclick="pay('PYQs',15)">Buy</button>
    </div>

    <div class="card">
      <h3>Mid Exams</h3>
      <div class="price">₹12</div>
      <button onclick="pay('Mid Exams',12)">Buy</button>
    </div>

    <div class="card">
      <h3>Full Bundle</h3>
      <div class="price">₹29</div>
      <button onclick="pay('Full Bundle',29)">Buy</button>
    </div>

  </div>
</div>

<script>

function hideAll() {
  document.getElementById("courses").style.display = "none";
  document.getElementById("departments").style.display = "none";
  document.getElementById("semesters").style.display = "none";
  document.getElementById("content").style.display = "none";
}

function showDepartments() {
  hideAll();
  document.getElementById("departments").style.display = "block";
}

function openSemester(dept) {
  hideAll();
  document.getElementById("semesters").style.display = "block";
  document.getElementById("deptTitle").innerText = dept + " - Select Semester";

  let html = "";
  for (let i = 1; i <= 8; i++) {
    html += `
      <div class="card" onclick="openContent('${dept} Sem ${i}')">
        Semester ${i}
      </div>
    `;
  }

  document.getElementById("semesterGrid").innerHTML = html;
}

function openContent(title) {
  hideAll();
  document.getElementById("content").style.display = "block";
  document.getElementById("contentTitle").innerText = title;
}

function pay(item, price) {
  alert("Selected: " + item + " ₹" + price);
  window.open("https://razorpay.me/@rohit285", "_blank");
}

</script>

</body>
</html>
